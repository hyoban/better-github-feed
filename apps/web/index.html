<!doctype html>
<html lang="en" style="color-scheme: dark light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fdfdfc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="GitHub Feed" />
    <title>Better GitHub Feed</title>
  </head>
  <body>
    <script>
      if (new URLSearchParams(location.search).has('debug-scroll')) {
        const startedAt = performance.now()
        let previous = ''
        const sample = () => {
          const root = document.documentElement
          const sidebar = document.querySelector('aside')
          const scrollPanel = document.querySelector('.scroll-panel')
          const describe = element =>
            element
              ? {
                  clientHeight: element.clientHeight,
                  scrollHeight: element.scrollHeight,
                  clientWidth: element.clientWidth,
                  scrollWidth: element.scrollWidth,
                  overflowY: getComputedStyle(element).overflowY,
                }
              : null
          const state = {
            elapsed: Math.round(performance.now() - startedAt),
            viewportScrollbar: window.innerWidth - root.clientWidth,
            stylesheets: document.styleSheets.length,
            root: describe(root),
            body: describe(document.body),
            sidebar: describe(sidebar),
            scrollPanel: describe(scrollPanel),
          }
          const signature = JSON.stringify({ ...state, elapsed: 0 })
          if (signature !== previous) {
            console.log('[DEBUG-scroll-probe]', JSON.stringify(state))
            previous = signature
          }
          if (performance.now() - startedAt < 15_000) requestAnimationFrame(sample)
        }
        requestAnimationFrame(sample)
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
